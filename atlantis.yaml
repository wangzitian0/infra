# Atlantis Repo Configuration
# See: https://www.runatlantis.io/docs/repo-level-atlantis-yaml.html

version: 3

projects:
  - dir: terraform
    workflow: custom
    terraform_version: v1.6.6
    autoplan:
      when_modified:
        - "**/*.tf"
        - "**/*.tfvars"
      enabled: false  # Disabled: CI triggers plan via comment after validation

workflows:
  custom:
    plan:
      steps:
        # Setup SSH for kubeconfig fetch (optional, for Helm provider)
        - run: |
            if [ -n "$VPS_SSH_KEY" ]; then
              mkdir -p ~/.ssh
              echo "$VPS_SSH_KEY" > ~/.ssh/id_rsa
              chmod 600 ~/.ssh/id_rsa
              ssh-keyscan -p 22 "$VPS_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true
            fi
        # Terraform init with R2 backend when credentials are available; otherwise fall back to local backend for plan
        - run: |
            set -euo pipefail
            if [ -n "${R2_BUCKET:-}" ] && [ -n "${R2_ACCOUNT_ID:-}" ] && [ -n "${AWS_ACCESS_KEY_ID:-}" ] && [ -n "${AWS_SECRET_ACCESS_KEY:-}" ]; then
              terraform init -input=false -upgrade \
                -backend-config="bucket=${R2_BUCKET}" \
                -backend-config="endpoints={s3=\"https://${R2_ACCOUNT_ID}.r2.cloudflarestorage.com\"}"
            else
              echo "Warning: R2 backend credentials missing; using local backend for plan (state will not be read)."
              terraform init -input=false -upgrade -backend=false
            fi
        - plan
    apply:
      steps:
        - run: |
            if [ -n "$VPS_SSH_KEY" ]; then
              mkdir -p ~/.ssh
              echo "$VPS_SSH_KEY" > ~/.ssh/id_rsa
              chmod 600 ~/.ssh/id_rsa
            fi
        - run: |
            set -euo pipefail
            if [ -z "${R2_BUCKET:-}" ] || [ -z "${R2_ACCOUNT_ID:-}" ] || [ -z "${AWS_ACCESS_KEY_ID:-}" ] || [ -z "${AWS_SECRET_ACCESS_KEY:-}" ]; then
              echo "Error: R2 backend credentials are required for apply. Set R2_BUCKET, R2_ACCOUNT_ID, AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY."
              exit 1
            fi
        - init:
            extra_args:
              - "-backend-config=bucket=$R2_BUCKET"
              - "-backend-config=endpoints={s3=\"https://$R2_ACCOUNT_ID.r2.cloudflarestorage.com\"}"
        - apply
