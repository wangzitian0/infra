# Atlantis Repo Configuration
# See: https://www.runatlantis.io/docs/repo-level-atlantis-yaml.html

version: 3

projects:
  - dir: terraform
    workflow: custom
    terraform_version: v1.6.6
    autoplan:
      when_modified:
        - "**/*.tf"
        - "**/*.tfvars"
      enabled: false  # Disabled: CI triggers plan via comment after validation

workflows:
  custom:
    plan:
      steps:
        # Setup SSH for kubeconfig fetch (optional, for Helm provider)
        - run: |
            if [ -n "$VPS_SSH_KEY" ]; then
              mkdir -p ~/.ssh
              echo "$VPS_SSH_KEY" > ~/.ssh/id_rsa
              chmod 600 ~/.ssh/id_rsa
              ssh-keyscan -p 22 "$VPS_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true
            fi
        # Require all deployment secrets; fail fast if any missing
        - run: |
            set -euo pipefail
            required="VPS_HOST VPS_SSH_KEY CLOUDFLARE_API_TOKEN CLOUDFLARE_ZONE_ID R2_BUCKET R2_ACCOUNT_ID AWS_ACCESS_KEY_ID AWS_SECRET_ACCESS_KEY"
            missing=0
            for var in $required; do
              eval "val=\${$var:-}"
              if [ -z "${val}" ]; then
                echo "Missing env: ${var}" >&2
                missing=1
              fi
            done
            if [ "$missing" -ne 0 ]; then
              echo "Aborting: required env vars missing."
              exit 1
            fi
        # Terraform init with R2 backend (fail if creds missing)
        - init:
            extra_args:
              - "-backend-config=bucket=$R2_BUCKET"
              - "-backend-config=endpoints={s3=\"https://$R2_ACCOUNT_ID.r2.cloudflarestorage.com\"}"
        - plan
    apply:
      steps:
        - run: |
            if [ -n "$VPS_SSH_KEY" ]; then
              mkdir -p ~/.ssh
              echo "$VPS_SSH_KEY" > ~/.ssh/id_rsa
              chmod 600 ~/.ssh/id_rsa
            fi
        - run: |
            set -euo pipefail
            required="VPS_HOST VPS_SSH_KEY CLOUDFLARE_API_TOKEN CLOUDFLARE_ZONE_ID R2_BUCKET R2_ACCOUNT_ID AWS_ACCESS_KEY_ID AWS_SECRET_ACCESS_KEY"
            missing=0
            for var in $required; do
              eval "val=\${$var:-}"
              if [ -z "${val}" ]; then
                echo "Missing env: ${var}" >&2
                missing=1
              fi
            done
            if [ "$missing" -ne 0 ]; then
              echo "Aborting: required env vars missing."
              exit 1
            fi
        - init:
            extra_args:
              - "-backend-config=bucket=$R2_BUCKET"
              - "-backend-config=endpoints={s3=\"https://$R2_ACCOUNT_ID.r2.cloudflarestorage.com\"}"
        - apply
